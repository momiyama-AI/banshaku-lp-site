<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>平日の晩酌を、ちょっと良くする</title>
  <meta name="description" content="晩酌グッズとお酒まわりのレビューLPを公開する準備中ページです。">
  <style>
    :root {
      color-scheme: dark;
      --bg: #10151f;
      --text: #f7f2e8;
      --muted: #c9c1b1;
      --amber: #d89b43;
      --line: #304057;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 32px 18px;
      background: var(--bg);
      color: var(--text);
      font-family: "Noto Sans JP", "Yu Gothic", "Meiryo", sans-serif;
      line-height: 1.75;
    }
    main {
      width: min(720px, 100%);
      border-top: 1px solid var(--line);
      border-bottom: 1px solid var(--line);
      padding: 40px 0;
    }
    .label {
      color: var(--amber);
      font-size: 0.9rem;
      font-weight: 700;
      letter-spacing: 0;
    }
    h1 {
      margin: 10px 0 16px;
      font-size: clamp(2rem, 7vw, 4rem);
      line-height: 1.2;
      letter-spacing: 0;
    }
    p {
      margin: 0;
      color: var(--muted);
      font-size: 1.05rem;
    }
  </style>
</head>
<body>
  <main>
    <div class="label">Banshaku Pipeline</div>
    <h1>平日の晩酌を、ちょっと良くする</h1>
    <p>レビューLPは準備中です。商品ページは承認済みキューから順次公開します。</p>
  </main>
</body>
</html>
