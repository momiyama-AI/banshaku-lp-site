<!doctype html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1200, initial-scale=1">
<title>SNS入口画像｜保冷缶ホルダー3商品比較</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Zen+Old+Mincho:wght@700;900&amp;family=Noto+Sans+JP:wght@500;700;900&amp;display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#0B2545;
    --navy2:#123B63;
    --teal:#1E88A8;
    --aqua:#8FD4E8;
    --amber:#C9932F;
    --amber-l:#E8B95A;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{
    background:#333;
    display:flex;align-items:center;justify-content:center;
    min-height:100vh;
    font-family:'Noto Sans JP',sans-serif;
  }
  .canvas{
    width:1200px;height:675px;
    position:relative;overflow:hidden;
    background:
      radial-gradient(ellipse 900px 600px at 78% 30%, rgba(30,136,168,.35), transparent 60%),
      linear-gradient(155deg,#0B2545 0%,#123B63 60%,#16536F 100%);
    color:#fff;
  }
  .bubble{
    position:absolute;border-radius:50%;
    border:2px solid rgba(255,255,255,.18);
  }
  .b1{width:120px;height:120px;right:-30px;top:60px;}
  .b2{width:52px;height:52px;right:150px;top:200px;border-color:rgba(255,255,255,.28);}
  .b3{width:26px;height:26px;right:110px;top:330px;border-color:rgba(143,212,232,.5);}
  .b4{width:70px;height:70px;left:-20px;bottom:120px;}
  .b5{width:30px;height:30px;left:90px;bottom:230px;border-color:rgba(255,255,255,.25);}
  .inner{
    position:absolute;inset:0;
    padding:56px 72px 48px;
    display:flex;flex-direction:column;
  }
  .top-row{display:flex;align-items:center;gap:16px;}
  .pr{
    font-size:15px;font-weight:700;letter-spacing:.1em;
    border:1.5px solid rgba(255,255,255,.55);
    border-radius:6px;padding:3px 12px;color:rgba(255,255,255,.85);
  }
  .eyebrow{
    font-size:17px;font-weight:700;letter-spacing:.3em;
    color:var(--aqua);
  }
  h1{
    font-family:'Zen Old Mincho',serif;
    font-weight:900;
    font-size:82px;
    line-height:1.32;
    letter-spacing:.02em;
    margin-top:34px;
  }
  h1 .amber{color:var(--amber-l);}
  .sub{margin-top:26px;display:flex;gap:14px;}
  .pill{
    font-size:20px;font-weight:700;letter-spacing:.06em;
    background:rgba(255,255,255,.1);
    border:1px solid rgba(143,212,232,.4);
    border-radius:99px;
    padding:9px 24px;color:#DCEFF5;
  }
  .pill b{color:var(--amber-l);font-weight:900;}
  .chips{margin-top:auto;display:flex;gap:14px;align-items:stretch;}
  .chip{
    flex:1;
    text-align:center;
    font-size:21px;font-weight:700;letter-spacing:.12em;
    padding:16px 0;
    border-radius:10px;
    background:rgba(255,255,255,.08);
    border:1px solid rgba(255,255,255,.22);
    color:rgba(255,255,255,.75);
  }
  .chip.answer{
    background:var(--amber);
    border-color:var(--amber-l);
    color:#fff;
    font-family:'Zen Old Mincho',serif;
    font-weight:900;font-size:30px;
    line-height:1;padding:12px 0 10px;
    box-shadow:0 6px 24px rgba(201,147,47,.5);
    position:relative;
  }
  .chip.answer small{
    display:block;font-family:'Noto Sans JP',sans-serif;
    font-size:11.5px;font-weight:700;letter-spacing:.2em;margin-top:5px;
  }
  .brand-strip{
    position:absolute;left:0;right:0;bottom:0;
    height:12px;
    background:linear-gradient(90deg,var(--amber),var(--amber-l));
  }
  .brand{
    position:absolute;right:26px;bottom:26px;
    font-family:'Zen Old Mincho',serif;
    font-size:16px;letter-spacing:.28em;color:rgba(255,255,255,.55);
    white-space:nowrap;
  }
</style>
</head>
<body>
  <div class="canvas">
    <span class="bubble b1"></span><span class="bubble b2"></span><span class="bubble b3"></span>
    <span class="bubble b4"></span><span class="bubble b5"></span>

    <div class="inner">
      <div class="top-row">
        <span class="pr">PR</span>
        <span class="eyebrow">保冷缶ホルダー 3商品比較</span>
      </div>

      <h1>キャンプの缶、<br><span class="amber">ぬるくなる前に</span>。</h1>

      <div class="sub">
        <span class="pill">価格帯 <b>約3倍差</b></span><span class="pill">用途 <b>3商品比較</b></span>
      </div>

      <div class="chips">
        
        <div class="chip">No.01</div>
        
        <div class="chip answer">？<small>用途で選ぶ</small></div>
        
        <div class="chip">No.03</div>
        
      </div>
    </div>

    <div class="brand">晩酌ラボ</div>
    <div class="brand-strip"></div>
  </div>
</body>
</html>
